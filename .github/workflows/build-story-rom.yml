name: Build Story ROM

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Build UUID from Story Builder
        required: true
      hack_title:
        description: Hack title
        required: true
      rom_game_code:
        description: ROM game code (e.g. BPEE)
        required: false
        default: BPEE

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GAME_VERSION: EMERALD

    steps:
      - name: Checkout story-builder
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Load story package
        id: story
        run: |
          PKG="build-requests/${{ inputs.build_id }}/story-package.json"
          if [ ! -f "$PKG" ]; then
            echo "::error::Story package not found at $PKG"
            exit 1
          fi
          cp "$PKG" story-package.json
          echo "Scenes: $(node -e "console.log(JSON.parse(require('fs').readFileSync('story-package.json')).scenes.length)")"

      - name: Checkout pokeemerald-expansion
        uses: actions/checkout@v4
        with:
          repository: rh-hideout/pokeemerald-expansion
          # Pinned: structural-hacks.mjs anchors are verified against this commit.
          ref: 662421c9225d59fbac466c9ced05fea4ff8e3441
          path: hack/pokeemerald-expansion
          submodules: recursive

      - name: Apply story to source
        run: node scripts/apply-story.mjs story-package.json hack/pokeemerald-expansion

      - name: Apply structural gameplay hacks
        run: node scripts/structural-hacks.mjs hack/pokeemerald-expansion

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-arm-none-eabi \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libpng-dev \
            python3 \
            build-essential

      - name: Cache host build tools
        uses: actions/cache@v4
        with:
          path: |
            hack/pokeemerald-expansion/tools/bin2c/bin2c
            hack/pokeemerald-expansion/tools/gbafix/gbafix
            hack/pokeemerald-expansion/tools/gbagfx/gbagfx
            hack/pokeemerald-expansion/tools/jsonproc/jsonproc
            hack/pokeemerald-expansion/tools/mapjson/mapjson
            hack/pokeemerald-expansion/tools/mid2agb/mid2agb
            hack/pokeemerald-expansion/tools/preproc/preproc
            hack/pokeemerald-expansion/tools/ramscrgen/ramscrgen
            hack/pokeemerald-expansion/tools/rsfont/rsfont
            hack/pokeemerald-expansion/tools/scaninc/scaninc
            hack/pokeemerald-expansion/tools/trainerproc/trainerproc
          key: expansion-tools-${{ runner.os }}-${{ hashFiles('hack/pokeemerald-expansion/tools/**') }}

      - name: Build ROM
        working-directory: hack/pokeemerald-expansion
        run: make -j$(nproc) -O

      - name: Locate ROM output
        id: rom
        working-directory: hack/pokeemerald-expansion
        run: |
          if [ -f pokeemerald.gba ]; then
            echo "path=pokeemerald.gba" >> "$GITHUB_OUTPUT"
          elif [ -f build/emerald/pokeemerald.gba ]; then
            echo "path=build/emerald/pokeemerald.gba" >> "$GITHUB_OUTPUT"
          else
            echo "::error::pokeemerald.gba not found after build"
            find . -name "*.gba" -type f | head -20
            exit 1
          fi

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: story-rom-${{ inputs.build_id }}
          path: hack/pokeemerald-expansion/${{ steps.rom.outputs.path }}
          retention-days: 14

      - name: Summary
        run: |
          echo "## Story ROM build complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Build ID:** ${{ inputs.build_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Title:** ${{ inputs.hack_title }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Game code:** ${{ inputs.rom_game_code }}" >> $GITHUB_STEP_SUMMARY
          echo "Download the \`story-rom-${{ inputs.build_id }}\` artifact from this workflow run." >> $GITHUB_STEP_SUMMARY
